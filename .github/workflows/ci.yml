name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        run: python -m pytest -q

  # Single stable status check for branch protection, independent of the
  # matrix. Require "all-tests" on main rather than each "test (3.x)" job.
  all-tests:
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Verify test matrix succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test matrix did not succeed: ${{ needs.test.result }}"
            exit 1
          fi
          echo "all matrix jobs passed"
