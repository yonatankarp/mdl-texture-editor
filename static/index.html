<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>MDL Texture Editor</title>
<style>
  html,body{margin:0;height:100%;font-family:sans-serif;background:#222;color:#ddd}
  #bar{height:40px;display:flex;align-items:center;gap:12px;padding:0 12px;background:#111}
  #split{display:flex;height:calc(100% - 40px)}
  #left,#right{flex:1;position:relative;overflow:hidden;border-right:1px solid #000}
  #left{display:flex;flex-direction:column}
  #painttools{height:34px;display:flex;align-items:center;gap:10px;padding:0 10px;
              background:#1a1a1a;font-size:12px}
  #painttools input[type=range]{width:90px}
  #paintwrap{flex:1;position:relative;overflow:auto;display:flex;
             align-items:center;justify-content:center}
  #paint{max-width:100%;max-height:100%;image-rendering:pixelated;
         cursor:crosshair;touch-action:none;background:#000}
  #canvas{width:100%;height:100%;display:block}
  #msg{position:absolute;top:12px;left:12px;right:12px;padding:8px 12px;background:#7a1f1f;
       color:#fff;border-radius:4px;font-size:13px;display:none;z-index:5}
</style>
<script type="importmap">
{ "imports": {
  "three": "/static/vendor/three.module.js",
  "three/addons/controls/OrbitControls.js": "/static/vendor/OrbitControls.js"
}}
</script>
</head>
<body>
  <div id="bar">
    <label>MDL path: <input id="path" value="samples/Paper2.MDL" size="40"></label>
    <button id="browse">Browse…</button>
    <button id="load">Load</button>
    <button id="mode565">565 preview: OFF</button>
    <button id="wire">Wireframe: OFF</button>
    <button id="flipv">Flip V: OFF</button>
    <button id="reveal">Reveal folder</button>
    <button id="save">Save to .MDL</button>
    <span id="editpath" style="font-size:12px;color:#9ab"></span>
  </div>
  <div id="split">
    <div id="left">
      <div id="painttools">
        <label>color <input type="color" id="color" value="#ff2d55"></label>
        <label>size <input type="range" id="brushsize" min="1" max="64" value="6"></label>
        <button id="undo" title="Ctrl/Cmd+Z" disabled>Undo</button>
        <button id="redo" title="Ctrl/Cmd+Y" disabled>Redo</button>
      </div>
      <div id="paintwrap"><canvas id="paint"></canvas></div>
    </div>
    <div id="right"><div id="msg"></div><canvas id="canvas"></canvas></div>
  </div>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
